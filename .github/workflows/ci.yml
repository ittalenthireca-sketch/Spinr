name: CI/CD Pipeline
# ============================================================
# BRANCH PROTECTION: This workflow must pass before merging.
# Required checks: secrets-scan, backend-test, frontend-test
# Configure in: Settings > Branches > Branch protection rules
# ============================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  secrets-scan:
    name: 🔐 Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest
    needs: secrets-scan

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spinr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('spinr/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        working-directory: spinr/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-asyncio pytest-mock
      
      - name: Run backend tests
        working-directory: spinr/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spinr_test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SECRET_KEY: test-secret-key-for-ci
          ENV: test
        run: |
          pytest --cov=backend --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./spinr/backend/coverage.xml
          flags: backend
          name: backend-coverage

  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest
    needs: secrets-scan

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            spinr/frontend/node_modules
            spinr/rider-app/node_modules
            spinr/driver-app/node_modules
            spinr/admin-dashboard/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: |
          cd spinr/frontend && npm ci
          cd ../rider-app && npm ci
          cd ../driver-app && npm ci
          cd ../admin-dashboard && npm ci
      
      - name: Run TypeScript type check
        working-directory: spinr/frontend
        run: npm run type-check
      
      - name: Run ESLint
        working-directory: spinr/frontend
        run: npm run lint
      
      - name: Run frontend tests
        working-directory: spinr/frontend
        run: npm test -- --coverage
      
      - name: Build frontend
        working-directory: spinr/frontend
        run: npm run build

  # Admin Dashboard Tests
  admin-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: spinr/admin-dashboard/node_modules
          key: ${{ runner.os }}-admin-node-${{ hashFiles('spinr/admin-dashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-admin-node-
      
      - name: Install dependencies
        working-directory: spinr/admin-dashboard
        run: npm ci
      
      - name: Run TypeScript type check
        working-directory: spinr/admin-dashboard
        run: npm run type-check
      
      - name: Run ESLint
        working-directory: spinr/admin-dashboard
        run: npm run lint
      
      - name: Build admin dashboard
        working-directory: spinr/admin-dashboard
        run: npm run build

  # E2E Tests (run on main branch only)
  e2e-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend-test, frontend-test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: spinr/frontend
        run: npm ci
      
      - name: Install Detox
        working-directory: spinr/frontend
        run: npm install -g detox-cli
      
      - name: Build app
        working-directory: spinr/frontend
        run: npm run build
      
      # Note: Full E2E tests require emulator/simulator setup
      # This is a placeholder for the E2E test step
      - name: Run E2E tests (placeholder)
        working-directory: spinr/frontend
        run: echo "E2E tests would run here with detox build-and-test"

  # Deploy Backend
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [secrets-scan, backend-test]
    # AUDIT REPO: Deploys disabled — this repo is for audit/hardening only.
    # Deployments run exclusively from srikumarimuddana-lab/spinr.
    if: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
      
      - name: Deploy to Fly.io (alternative)
        if: failure()
        uses: superfly/flyctl-actions@1.3
        with:
          args: "deploy --remote-only"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Deploy Frontend
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [secrets-scan, frontend-test]
    # AUDIT REPO: Deploys disabled — see deploy-backend comment above.
    if: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: spinr/frontend
        run: npm ci
      
      - name: Build for production
        working-directory: spinr/frontend
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npm run build
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
          working-directory: spinr/frontend

  # Deploy Admin Dashboard
  deploy-admin:
    runs-on: ubuntu-latest
    needs: [secrets-scan, admin-test]
    # AUDIT REPO: Deploys disabled — see deploy-backend comment above.
    if: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        working-directory: spinr/admin-dashboard
        run: npm ci
      
      - name: Build for production
        working-directory: spinr/admin-dashboard
        run: npm run build
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          working-directory: spinr/admin-dashboard

  # Mobile Build (EAS)
  mobile-build:
    runs-on: ubuntu-latest
    needs: [frontend-test]
    # AUDIT REPO: Mobile builds disabled — see deploy-backend comment above.
    if: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      
      - name: Install dependencies
        working-directory: spinr/rider-app
        run: npm ci
      
      - name: Build iOS
        working-directory: spinr/rider-app
        run: eas build --platform ios --non-interactive
      
      - name: Build Android
        working-directory: spinr/rider-app
        run: eas build --platform android --non-interactive

  # Security Scan
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Notify on failure
  notify-failure:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: failure()
    
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: 'CI/CD Pipeline Failed'