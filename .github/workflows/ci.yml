name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spinr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-asyncio pytest-mock

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend (ruff)
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spinr_test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: test-secret-key-for-ci-only-32chars!!
          ADMIN_PASSWORD: TestAdminPass123!
          ENV: test
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  # [DEPRECATED] frontend/ legacy app — kept so downstream jobs that list
  # `needs: [frontend-test]` continue to pass while the migration settles.
  # Source of truth is now rider-app/. Remove this job once deploy-frontend
  # is confirmed stable from rider-app (SPR-01, task 1b). [SPR-01]
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deprecation notice
        run: |
          echo "::warning::frontend/ is DEPRECATED (SPR-01/D-003). Web builds now come from rider-app/. This job will be removed in SPR-02."

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-node-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-frontend-node-

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        working-directory: frontend
        run: yarn lint

      - name: Run frontend tests
        working-directory: frontend
        run: yarn test --ci --coverage --reporters=default

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          file: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  # Driver App Tests
  driver-app-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: driver-app/node_modules
          key: ${{ runner.os }}-driver-node-${{ hashFiles('driver-app/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-driver-node-

      - name: Install dependencies
        working-directory: driver-app
        run: yarn install --frozen-lockfile

      - name: Run driver app tests
        working-directory: driver-app
        run: yarn test --ci --coverage --reporters=default

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          file: ./driver-app/coverage/coverage-final.json
          flags: driver-app
          name: driver-app-coverage

  # Rider App Tests (dedicated app — rider-app/)
  # Note: frontend/ is the legacy combined app, still tested by frontend-test.
  # This job covers the canonical rider-app/ going forward.
  rider-app-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: rider-app/node_modules
          key: ${{ runner.os }}-rider-node-${{ hashFiles('rider-app/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-rider-node-

      - name: Install dependencies
        working-directory: rider-app
        run: yarn install --frozen-lockfile

      - name: Run rider app tests
        working-directory: rider-app
        run: yarn test --ci --coverage --reporters=default

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          file: ./rider-app/coverage/coverage-final.json
          flags: rider-app
          name: rider-app-coverage

  # Admin Dashboard Tests
  admin-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: admin-dashboard/node_modules
          key: ${{ runner.os }}-admin-node-${{ hashFiles('admin-dashboard/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-admin-node-

      - name: Install dependencies
        working-directory: admin-dashboard
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: admin-dashboard
        # 21 pre-existing React Compiler errors from Next.js 15 built-in rules
        # that cannot be downgraded via eslint config. Continue on error to
        # avoid blocking PRs on legacy violations.
        continue-on-error: true
        run: npm run lint

      - name: Run admin dashboard tests
        working-directory: admin-dashboard
        run: npm test

      - name: Build admin dashboard
        working-directory: admin-dashboard
        run: npm run build

  # E2E Tests (run on main branch only)
  e2e-test:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, admin-test]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: admin-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Start Next.js and run E2E tests
        run: |
          npx next start &
          npx wait-on http://localhost:3000 --timeout 30000
          npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: admin-dashboard/playwright-report/
          retention-days: 7

  # E2E Tests — rider-app web (SPR-02/2b, 2c)
  # Exports the Expo web build, serves it on :3002, and runs Playwright
  # smoke + ride-booking tests with all backend calls mocked.
  rider-web-e2e:
    name: E2E tests (rider-app web)
    runs-on: ubuntu-latest
    needs: [rider-app-test]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: rider-app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: rider-app/node_modules
          key: ${{ runner.os }}-rider-node-${{ hashFiles('rider-app/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-rider-node-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Expo web export
        env:
          EXPO_PUBLIC_BACKEND_URL: http://localhost:8000
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: test-key
        run: npx expo export --platform web

      - name: Serve export and run E2E tests
        env:
          PLAYWRIGHT_START_SERVER: '1'
          PLAYWRIGHT_PORT: '3002'
          CI: 'true'
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rider-playwright-report
          path: rider-app/playwright-report/
          retention-days: 7

  # Performance baseline (SPR-02/2d)
  # Runs the in-process ASGI benchmark (no real Supabase needed) and saves the
  # JSON report as an artifact. On main branch the report is compared against
  # the last uploaded baseline to detect regressions (P95 +30% threshold).
  perf-baseline:
    name: Perf baseline (API P95 + WS)
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Download baseline report (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: perf-baseline-report
          path: backend/tests/baseline/

      - name: Run performance baseline
        env:
          JWT_SECRET: ci-perf-test-secret-key-32-chars!
          ADMIN_PASSWORD: TestAdminPass123!
          ADMIN_EMAIL: admin@spinr.ca
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test_key
          ENV: test
        run: |
          python backend/tests/perf_baseline.py \
            --samples 50 \
            --ws-samples 20 \
            --out backend/tests/perf_report.json \
            --baseline backend/tests/baseline/perf_report.json

      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-report
          path: backend/tests/perf_report.json
          retention-days: 90

  # OTA update — push JS bundle to EAS preview channel (SPR-03/3d)
  # Runs on every merge to main after both app tests pass.
  # Riders and drivers on the `preview` build receive the update automatically
  # when they next open the app (expo-updates checks on launch + background).
  # Production channel is updated manually via `eas update --channel production`
  # as part of the SPR-04 release process.
  ota-update:
    name: OTA update (EAS preview channel)
    runs-on: ubuntu-latest
    needs: [rider-app-test, driver-app-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Push OTA update — rider-app
        working-directory: rider-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          yarn install --frozen-lockfile
          eas update \
            --channel preview \
            --message "ci: OTA ${{ github.sha }}" \
            --non-interactive \
            --platform all

      - name: Push OTA update — driver-app
        working-directory: driver-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          yarn install --frozen-lockfile
          eas update \
            --channel preview \
            --message "ci: OTA ${{ github.sha }}" \
            --non-interactive \
            --platform all

  # Deploy Backend
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"

      - name: Deploy to Fly.io (alternative)
        if: failure()
        uses: superfly/flyctl-actions@1.6
        with:
          args: "deploy --remote-only"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Deploy Rider Web App (Expo web export from rider-app/) [SPR-01/D-003/D-004]
  # Previously deployed from frontend/ (deprecated). Now builds from rider-app/
  # which is the canonical, feature-complete rider app with full web support.
  # native-only packages (react-native-maps) are stubbed via metro.config.js.
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [rider-app-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: rider-app/node_modules
          key: ${{ runner.os }}-rider-node-${{ hashFiles('rider-app/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-rider-node-

      - name: Install dependencies
        working-directory: rider-app
        run: yarn install --frozen-lockfile

      - name: Build for production (web)
        working-directory: rider-app
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
        run: npx expo export --platform web

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
          working-directory: rider-app

  # Deploy Admin Dashboard
  deploy-admin:
    runs-on: ubuntu-latest
    needs: [admin-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: admin-dashboard
        run: npm ci --legacy-peer-deps

      - name: Build for production
        working-directory: admin-dashboard
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          working-directory: admin-dashboard

  # Mobile Build (EAS)
  mobile-build:
    runs-on: ubuntu-latest
    needs: [rider-app-test, driver-app-test]
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[build]')

    steps:
      - uses: actions/checkout@v4

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install rider app dependencies
        working-directory: rider-app
        run: yarn install --frozen-lockfile

      - name: Build iOS (Rider)
        working-directory: rider-app
        run: eas build --platform ios --non-interactive

      - name: Build Android (Rider)
        working-directory: rider-app
        run: eas build --platform android --non-interactive

  # Security Scan — filesystem (dependency CVEs) + secrets
  # On pull requests / pushes: incremental git history scan (HEAD~1).
  # On release tags or manual dispatch: full history scan + stricter Trivy.
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required for Trivy SARIF upload to GitHub Security tab

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for trufflehog

      - name: Install trufflehog v3
        run: |
          curl -sLo trufflehog.tar.gz \
            https://github.com/trufflesecurity/trufflehog/releases/download/v3.94.3/trufflehog_3.94.3_linux_amd64.tar.gz
          tar -xzf trufflehog.tar.gz trufflehog
          chmod +x trufflehog && sudo mv trufflehog /usr/local/bin/

      - name: Secrets scan — git history
        run: |
          # Full-history scan on release tags and manual dispatches;
          # incremental (HEAD~1) on every other push to keep CI fast.
          if [[ "${{ github.ref }}" == refs/tags/* || "${{ github.event_name }}" == "release" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "::notice::Full git-history secrets scan (release / dispatch)"
            trufflehog git file://. --only-verified --fail
          else
            echo "::notice::Incremental secrets scan (last commit)"
            trufflehog git file://. --only-verified --since-commit HEAD~1 --fail
          fi

      - name: Secrets scan — working tree
        # Catches secrets in config templates, store metadata, and other
        # non-committed-content files that trufflehog git may miss.
        run: |
          trufflehog filesystem . --only-verified --fail \
            --exclude-paths=.trufflehog-ignore 2>/dev/null || \
          trufflehog filesystem . --only-verified --fail

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Docker image security scan — blocks on CRITICAL or HIGH CVEs
  docker-image-scan:
    runs-on: ubuntu-latest
    needs: [backend-test]
    permissions:
      security-events: write  # required for Trivy SARIF upload to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag spinr-backend:ci-${{ github.sha }} \
            backend/

      - name: Scan image with Trivy (table — visible in log)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: spinr-backend:ci-${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: spinr-backend:ci-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload image scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-image.sarif'

  # Post-deploy smoke test
  smoke-test:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Health check
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://spinr-api.fly.dev/health || \
            curl -f --retry 3 --retry-delay 5 \
            https://spinr-api.onrender.com/health

      - name: Settings endpoint
        run: |
          curl -f https://spinr-api.fly.dev/api/v1/settings || \
          curl -f https://spinr-api.onrender.com/api/v1/settings

      - name: Vehicle types endpoint
        run: |
          curl -f https://spinr-api.fly.dev/api/v1/vehicle-types || \
          curl -f https://spinr-api.onrender.com/api/v1/vehicle-types

  # Notify on failure
  notify-failure:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, rider-app-test, driver-app-test, admin-test, e2e-test, security-scan, docker-image-scan]
    if: failure()

    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: 'CI/CD Pipeline Failed'

  # Auto-create GitHub Issue on pipeline failure
  notify-issue:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, rider-app-test, driver-app-test, admin-test, e2e-test, security-scan, docker-image-scan]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failure on ${context.ref} \u2014 ${context.sha.slice(0,7)}`,
              body: [
                `**Branch:** ${context.ref}`,
                `**Commit:** ${context.sha}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Triggered by:** ${context.actor}`,
              ].join('\n'),
              labels: ['ci-failure', 'auto']
            })

  # Notify on successful deploy to main
  notify-deploy:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-admin]
    if: success() && github.ref == 'refs/heads/main'

    steps:
      - name: Send Slack deploy success notification
        uses: 8398a7/action-slack@v3
        with:
          status: success
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: |
            :rocket: *Spinr deployed to production*
            Commit: `${{ github.sha }}` by ${{ github.actor }}
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>
