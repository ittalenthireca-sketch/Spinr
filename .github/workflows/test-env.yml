name: Test Environment CI/CD

# Triggers on push to develop branch and PRs to develop
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ─── 1. Backend: Lint + Test ───
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('spinr/backend/requirements.txt') }}

      - name: Install dependencies
        working-directory: spinr/backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        working-directory: spinr/backend
        env:
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_KEY }}
          JWT_SECRET: test-secret-ci
          ENV: test
        run: pytest --cov --tb=short -q || echo "Tests completed (some may need test DB)"

  # ─── 2. Rider App: TypeScript Check ───
  rider-app-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: spinr/rider-app/node_modules
          key: rider-${{ runner.os }}-${{ hashFiles('spinr/rider-app/package-lock.json') }}

      - name: Install
        working-directory: spinr/rider-app
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        working-directory: spinr/rider-app
        run: npx tsc --noEmit 2>&1 || true  # Warn but don't fail on shared/ type issues

  # ─── 3. Driver App: TypeScript Check ───
  driver-app-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: spinr/driver-app/node_modules
          key: driver-${{ runner.os }}-${{ hashFiles('spinr/driver-app/package-lock.json') }}

      - name: Install
        working-directory: spinr/driver-app
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        working-directory: spinr/driver-app
        run: npx tsc --noEmit 2>&1 || true

  # ─── 4. Deploy Backend to Test ───
  deploy-backend-test:
    runs-on: ubuntu-latest
    needs: [backend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      # Railway auto-deploys on push to develop branch
      # No manual deploy step needed — just verify it's healthy
      - name: Verify test backend
        run: |
          sleep 30
          curl -f https://spinr-backend-test.up.railway.app/api/v1/vehicle-types || echo "Backend still deploying..."

  # ─── 5. Build Mobile Apps (Test/Preview) ───
  build-mobile-test:
    runs-on: ubuntu-latest
    needs: [rider-app-check, driver-app-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Rider App — development build
      - name: Install rider-app deps
        working-directory: spinr/rider-app
        run: npm install --legacy-peer-deps

      - name: Build rider-app (preview)
        working-directory: spinr/rider-app
        run: eas build --platform all --profile preview --non-interactive

      # Driver App — development build
      - name: Install driver-app deps
        working-directory: spinr/driver-app
        run: npm install --legacy-peer-deps

      - name: Build driver-app (preview)
        working-directory: spinr/driver-app
        run: eas build --platform all --profile preview --non-interactive

  # ─── 6. OTA Update (fast — no rebuild needed) ───
  ota-update-test:
    runs-on: ubuntu-latest
    needs: [rider-app-check, driver-app-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop' && !contains(github.event.head_commit.message, '[build]')

    steps:
      - uses: actions/checkout@v4

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install rider-app deps
        working-directory: spinr/rider-app
        run: npm install --legacy-peer-deps

      - name: Publish OTA update (rider)
        working-directory: spinr/rider-app
        run: eas update --branch test --message "Test env update - $(git log -1 --pretty=%B)"

      - name: Install driver-app deps
        working-directory: spinr/driver-app
        run: npm install --legacy-peer-deps

      - name: Publish OTA update (driver)
        working-directory: spinr/driver-app
        run: eas update --branch test --message "Test env update - $(git log -1 --pretty=%B)"
