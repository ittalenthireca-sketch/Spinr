# Spinr — synthetic health monitors
#
# Phase 2.6 of the production-readiness audit (audit finding T9).
#
# Scheduled GitHub Actions cron that probes the public endpoints from
# outside our hosting provider. Complements Fly's own liveness checks
# (which can't detect DNS/edge/LB failure) and the /health/deep probe
# (which can't run unless the API is reachable in the first place).
#
# Three monitors:
#   1. /health            — every 5 min, across prod + staging.
#   2. /health/deep       — every 5 min, prod only (staging flaps).
#   3. Rider "smoke flow" — every 15 min, staging only. Exercises the
#      unauthenticated /rides/estimate endpoint. Not a full ride
#      request (that'd need a rotated JWT secret in CI and is out of
#      scope for a synthetic).
#
# On failure: posts to #spinr-alerts via SLACK_WEBHOOK_ALERTS secret.
# PagerDuty integration lives in alertmanager for metric-driven
# alerts; synthetics use Slack-only because GH Actions latency is
# too variable to be a reliable pager source.

name: synthetic-health

on:
  schedule:
    # GitHub cron runs on UTC. Granularity is ~5 min; */5 is the
    # floor. Don't expect sub-minute precision.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Override target (production | staging | both)"
        required: false
        default: "both"

# Cancel an in-flight run if a new one starts — keeps the monitor
# from piling up if a probe ever stalls on a timeout.
concurrency:
  group: synthetic-health
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  health-shallow:
    name: "GET /health (shallow liveness)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: production
            url: https://spinr-api.fly.dev
          - env: staging
            url: https://spinr-api-staging.fly.dev
    steps:
      - name: Probe ${{ matrix.env }}
        id: probe
        shell: bash
        run: |
          # -f fails on 4xx/5xx, -s silent, -o writes body, -w prints
          # the HTTP code + total time after. 10s timeout is generous
          # for a liveness probe that should be ~20 ms.
          http_code=$(curl -fsS -o /tmp/body.json -w "%{http_code}" \
                          --max-time 10 "${{ matrix.url }}/health" || echo "000")
          echo "http_code=$http_code" >> "$GITHUB_OUTPUT"
          echo "Response code: $http_code"
          cat /tmp/body.json || true
          if [ "$http_code" != "200" ]; then
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure() && matrix.env == 'production'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{
              \"text\": \":rotating_light: synthetic: *${{ matrix.env }}* /health returned ${{ steps.probe.outputs.http_code }}\",
              \"username\": \"spinr-synthetic\"
            }" "$SLACK_WEBHOOK"

  health-deep:
    name: "GET /health/deep (readiness)"
    runs-on: ubuntu-latest
    # Only probe prod-deep — staging's /health/deep is flakier (Redis
    # scaled-to-zero, seed data gaps) and would bury real incidents
    # in noise.
    steps:
      - name: Probe production /health/deep
        id: probe
        shell: bash
        run: |
          http_code=$(curl -fsS -o /tmp/body.json -w "%{http_code}" \
                          --max-time 15 "https://spinr-api.fly.dev/health/deep" || echo "000")
          echo "http_code=$http_code" >> "$GITHUB_OUTPUT"
          echo "Response code: $http_code"
          cat /tmp/body.json || true
          if [ "$http_code" != "200" ]; then
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          body=$(cat /tmp/body.json 2>/dev/null | head -c 800 || echo "(no body)")
          # Slack requires escaping. jq -R -s makes a JSON-safe string.
          escaped_body=$(echo "$body" | jq -R -s .)
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{
              \"text\": \":rotating_light: synthetic: production /health/deep returned ${{ steps.probe.outputs.http_code }}\\nBody: $escaped_body\",
              \"username\": \"spinr-synthetic\"
            }" "$SLACK_WEBHOOK"

  rider-smoke-flow:
    name: "Rider smoke flow (estimate)"
    runs-on: ubuntu-latest
    # Run less often (GH cron has no per-job schedule so we gate via
    # the minute, and even the 5-min granularity makes 15-min
    # intervals approximate).
    if: "${{ (github.event_name == 'schedule' && github.run_number % 3 == 0) || github.event_name == 'workflow_dispatch' }}"
    steps:
      - name: POST /rides/estimate against staging
        shell: bash
        run: |
          # Unauthenticated estimate (returns 401 in prod if endpoint
          # changes to require auth — which would itself be a
          # meaningful signal). Staging should return 200 with a fare
          # range for the fixed route.
          body='{
            "pickup_lat":  52.1332,
            "pickup_lng": -106.6700,
            "dropoff_lat": 52.1708,
            "dropoff_lng": -106.6996,
            "ride_type":  "standard"
          }'
          http_code=$(curl -sS -o /tmp/body.json -w "%{http_code}" \
                          --max-time 20 \
                          -H 'Content-Type: application/json' \
                          -d "$body" \
                          "https://spinr-api-staging.fly.dev/rides/estimate" || echo "000")
          echo "Response code: $http_code"
          cat /tmp/body.json || true
          # 200 (happy) and 401 (auth gate, if tightened later) both
          # prove the endpoint is alive. 5xx or network failure =
          # fail.
          if [ "$http_code" != "200" ] && [ "$http_code" != "401" ]; then
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data '{"text":":warning: synthetic: staging /rides/estimate smoke flow failed","username":"spinr-synthetic"}' \
            "$SLACK_WEBHOOK"

  # 2.6d — k6 baseline as a scheduled load synthetic (Phase 2.5e / T8).
  # Runs the k6 "smoke" scenario (1 VU × 30s) against staging every
  # ~30 min (every 6th cron tick of the 5-min parent schedule).
  # Purpose: catch latency regressions between prod deploys that the
  # curl-based probes above can't detect (they only check HTTP status).
  # Threshold failures are surfaced to Slack; they do NOT page on-call
  # because a single k6 run is too noisy to be a reliable pager source.
  k6-latency-synthetic:
    name: "k6 latency synthetic (smoke scenario)"
    runs-on: ubuntu-latest
    if: "${{ (github.event_name == 'schedule' && github.run_number % 6 == 0) || github.event_name == 'workflow_dispatch' }}"
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run k6 smoke against staging
        id: k6
        env:
          BASE_URL: https://spinr-api-staging.fly.dev
          SCENARIO: smoke
        # --out json captures the summary for Slack; exit code non-zero
        # on threshold failure (http_req_failed > 0.1% or p95 > 400ms).
        run: |
          k6 run ops/loadtest/k6-api-baseline.js \
            --out json=/tmp/k6-summary.json || echo "K6_FAILED=true" >> "$GITHUB_ENV"

      - name: Notify Slack on threshold failure
        if: env.K6_FAILED == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data '{
              "text": ":chart_with_downwards_trend: synthetic: k6 latency thresholds breached on staging — p95 may be above 400ms or error rate above 0.1%. Check Grafana for correlation.",
              "username": "spinr-synthetic"
            }' \
            "$SLACK_WEBHOOK"
