version: 2
updates:
  # GitHub Actions — keep action versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]

  # Backend (Python / pip)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      minor-pip:
        applies-to: version-updates
        patterns: ["*"]
    open-pull-requests-limit: 5

  # Admin Dashboard
  - package-ecosystem: "npm"
    directory: "/admin-dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      minor-npm:
        applies-to: version-updates
        patterns: ["*"]
    open-pull-requests-limit: 5

  # Frontend (Expo web)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
    open-pull-requests-limit: 3

  # Rider App
  - package-ecosystem: "npm"
    directory: "/rider-app"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
    open-pull-requests-limit: 3

  # Driver App
  - package-ecosystem: "npm"
    directory: "/driver-app"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
    open-pull-requests-limit: 3
