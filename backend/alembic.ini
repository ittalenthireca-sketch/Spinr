# Alembic configuration for spinr backend.
#
# Schema-authoritative bootstrap still lives in backend/migrations/*.sql
# (applied by backend/scripts/run_migrations.py). Alembic is the path
# for ALL new schema changes going forward. See backend/alembic/README.md
# for the cutover and day-to-day workflow.

[alembic]
# Path to migration scripts — relative to this file.
script_location = alembic

# Template used when running `alembic revision`. %%(rev)s prefixes the
# revision id; %%(slug)s is the short --message tag. We intentionally
# skip timezone formatting so filenames sort lexicographically by rev.
file_template = %%(year)04d%%(month)02d%%(day)02d_%%(rev)s_%%(slug)s

# Use UTC for timestamps in generated revisions so CI and local devs
# produce identical filenames no matter the host TZ.
timezone = UTC

# Detect schema drift on diff (no-op for us — no SQLAlchemy models —
# but harmless if we add them later).
compare_type = true
compare_server_default = true

# sqlalchemy.url is NOT set here on purpose. env.py pulls DATABASE_URL
# from the environment, which is how the rest of the stack is
# configured. Setting it here would bake a dev URL into the repo.
sqlalchemy.url =


[post_write_hooks]
# Auto-format generated revisions with ruff so they pass lint on first
# commit. No-op if ruff isn't installed locally.
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
