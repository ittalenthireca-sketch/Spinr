app = "spinr-backend"
primary_region = "sjc"

[build]
  dockerfile = "backend/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # DO NOT flip auto_stop_machines back on, or set min_machines_running to 0,
  # without first splitting the background loops into a dedicated worker
  # process (see production-readiness audit P1-B8). The backend currently
  # runs 5 critical background tasks in-process — surge pricing, scheduled
  # ride dispatch, payment retry, document expiry, subscription expiry.
  # When the machine stops, every one of them stops too: scheduled rides
  # silently miss their dispatch window, failed payments are never retried,
  # and expired documents never alert the driver. Keep at least 1 machine
  # running until the worker split lands.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[env]
  PORT = "8000"
  # Set other env vars via 'fly secrets set' or environment specific files
