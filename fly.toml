app = "spinr-backend"
primary_region = "sjc"

[build]
  dockerfile = "backend/Dockerfile"

# ── Process model ──────────────────────────────────────────────────────────
# The deploy runs as two separate Fly processes from the same Docker image:
#
#   app    — Uvicorn serving the FastAPI HTTP API. Scales with load.
#   worker — Single always-on machine running the background loops
#            (surge pricing, scheduled ride dispatch, payment retry,
#            document expiry, subscription expiry). Never serves HTTP.
#
# Splitting these fixes the historical P0-B8 audit finding: running the
# loops inside the API meant every machine stop / drain / redeploy
# dropped scheduled dispatches, missed payment retries, and silenced
# document-expiry alerts. See backend/worker.py for the entrypoint,
# and core/lifespan._should_run_background_tasks for the gate that
# prevents double-execution when FLY_PROCESS_GROUP=app.
[processes]
  app = "sh -c 'uvicorn server:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1'"
  worker = "python -m worker"

[http_service]
  internal_port = 8000
  force_https = true
  # Worker split landed (see [processes] above); keep min_machines=1 on
  # the app pool so riders always have an API to talk to during deploys.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# Per-process VM sizing. The worker is pure background I/O (no HTTP
# request concurrency) so a small shared CPU is plenty. Two workers
# would double-execute every loop (payment-retry races, duplicate
# push notifications), so keep the pool at exactly 1 via
# `fly scale count worker=1`.
[[vm]]
  processes = ["worker"]
  size = "shared-cpu-1x"
  memory = "512mb"

[env]
  PORT = "8000"
  # Set other env vars via 'fly secrets set' or environment specific files
